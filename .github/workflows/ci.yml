name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install MinIO (integration tests spawn it; no AWS involved)
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://dl.min.io/server/minio/release/linux-amd64/archive/minio.RELEASE.2025-09-07T16-13-09Z \
            -o "$HOME/.local/bin/minio"
          chmod +x "$HOME/.local/bin/minio"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: go build ./...
      - run: go vet ./...
      # -tags integration compiles the whole suite, unit + MinIO-backed
      - run: go test -tags integration ./...
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
